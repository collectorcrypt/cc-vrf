[toolchain]
anchor_version = "0.31.1"

[features]
resolution = true
skip-lint = false

[programs.localnet]
cc_vrf = "ccvrfu3fSpbnPLiUqdWAt85Zn9nq96ekwGTbHqGtdgQ"

[programs.devnet]
cc_vrf = "ccvrfu3fSpbnPLiUqdWAt85Zn9nq96ekwGTbHqGtdgQ"

[programs.mainnet]
cc_vrf = "ccvrfu3fSpbnPLiUqdWAt85Zn9nq96ekwGTbHqGtdgQ"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

[scripts]
# `anchor test` is not used — program correctness is exercised by the TS
# packages (vitest) and the live dice-demo smoke test (CC_VRF_SMOKE=1). This
# stub exists only so `anchor test` doesn't error if invoked directly.
test = "true"

[test]
startup_wait = 10000
shutdown_wait = 2000
upgradeable = false
